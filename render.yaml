services:
  - type: web
    name: arkheia-cps-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: arkheia-cps-db
          property: connectionString
      - key: ENV
        value: prod
      - key: SECRET_KEY
        generateValue: true
    healthCheckPath: /health
    autoDeploy: true

databases:
  - name: arkheia-cps-db
    databaseName: arkheia_cps
    user: arkheia
    plan: free
